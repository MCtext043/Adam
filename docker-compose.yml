services:
  postgres:
    image: postgres:16
    container_name: adam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: adam_delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # Локально по умолчанию 5433 на всех интерфейсах. На сервере в .env задайте, например:
    # POSTGRES_PORT_MAPPING=127.0.0.1:8009:5432
    ports:
      - "${POSTGRES_PORT_MAPPING:-0.0.0.0:5433:5432}"
    volumes:
      - adam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adam_delivery"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Запуск: docker compose --profile app up -d --build
  # Сайт: http://СЕРВЕР:8010  (порт задаётся APP_PORT)
  web:
    profiles: ["app"]
    build: .
    container_name: adam-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8010}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/adam_delivery}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  adam_postgres_data:
