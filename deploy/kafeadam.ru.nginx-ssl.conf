# Опционально: HTTPS на 443, HTTP-сайт «Адам» уже на порту 80 (Docker).
# Установка после certbot:
#   certbot certonly --nginx -d kafeadam.ru -d www.kafeadam.ru
# или настройте вручную ssl_certificate paths ниже.

server {
    listen 443 ssl http2;
    server_name kafeadam.ru www.kafeadam.ru;

    ssl_certificate     /etc/letsencrypt/live/kafeadam.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kafeadam.ru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name kafeadam.ru www.kafeadam.ru;
    return 301 https://$host$request_uri;
}
