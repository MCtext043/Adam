# Nginx: проксировать сайт «Адам» на уже занятом порту 80 (рядом с другим backend).
# Установите конфиг в /etc/nginx/sites-available/ и включите site.
#
# Замените adam.example.com на ваш домен или используйте только listen + server_name _;

server {
    listen 80;
    server_name adam.example.com;

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
