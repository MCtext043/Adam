<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="origin">
  <meta name="robots" content="noindex, nofollow">
  <title>Админ-панель | Кафе Адам</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="admin-body">
  <header class="admin-header">
    <a class="brand" href="/">
      <span class="brand-mark">
        <img src="/static/img/adam-logo.png" alt="Логотип кафе Адам">
      </span>
      <span>Кафе Адам</span>
    </a>
    <div>
      <p class="eyebrow">Админ-панель</p>
      <h1 id="adminPageTitle">Текущие заказы</h1>
    </div>
    <div class="admin-header-actions">
      <a class="button button-light" href="/">На сайт</a>
      <a class="button button-outline" href="/admin/logout">Выйти</a>
    </div>
  </header>

  <main class="admin-main">
    <section class="admin-settings-panel">
      <h2>Настройки доставки</h2>
      <form class="admin-settings-form" id="adminSettingsForm">
        <label>
          Минимальная сумма заказа, ₽
          <input type="number" id="minOrderAmount" name="min_order_amount" min="0" step="50" required>
        </label>
        <label>
          Бесплатная доставка от, ₽
          <input type="number" id="freeDeliveryThreshold" name="free_delivery_threshold" min="0" step="100" required>
        </label>
        <label>
          Цена доставки, ₽ / км
          <input type="number" id="deliveryPricePerKm" name="delivery_price_per_km" min="0" step="1" required>
        </label>
        <button class="button button-dark" type="submit">Сохранить</button>
        <p class="form-message" id="settingsMessage" hidden></p>
      </form>
    </section>

    <nav class="admin-tabs" aria-label="Разделы заказов">
      <button type="button" class="admin-tab is-active" data-admin-tab="today">Сегодня</button>
      <button type="button" class="admin-tab" data-admin-tab="archive">Архив</button>
    </nav>

    <section class="admin-orders-section" id="adminSectionToday">
      <div class="admin-toolbar">
        <p>Заказы за сегодня — кухня видит состав, телефон и адрес доставки.</p>
        <button class="button button-dark" id="refreshOrders" type="button">Обновить</button>
      </div>
      <section class="orders-grid" id="orders"></section>
    </section>

    <section class="admin-orders-section" id="adminSectionArchive" hidden>
      <div class="admin-toolbar">
        <p>Заказы за прошлые дни (не сегодня). Статус можно изменить при необходимости.</p>
        <button class="button button-dark" id="refreshArchive" type="button">Обновить</button>
      </div>
      <section class="orders-grid" id="ordersArchive"></section>
    </section>
  </main>

  <script>
    window.ORDER_STATUSES = {{ statuses | tojson }};
  </script>
  <script src="/static/js/admin.js?v=3"></script>
</body>
</html>
