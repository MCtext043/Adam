<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="origin">
  <meta name="robots" content="noindex, nofollow">
  <title>Вход в админ-панель | Кафе Адам</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="admin-login-body">
  <main class="admin-login-card">
    <a class="brand brand-admin-login" href="/">
      <span class="brand-mark">
        <img src="/static/img/adam-logo.png" alt="Логотип кафе Адам">
      </span>
      <span>Кафе Адам</span>
    </a>
    <h1 class="admin-login-title">Вход для персонала</h1>
    {% if error %}
    <p class="form-message error" role="alert">{{ error }}</p>
    {% endif %}
    <form method="post" action="/admin/login" class="order-form">
      <label>
        Логин
        <input name="username" type="text" autocomplete="username" required>
      </label>
      <label>
        Пароль
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button class="button button-dark" type="submit">Войти</button>
    </form>
    <p class="admin-login-footer"><a href="/">На сайт</a></p>
  </main>
</body>
</html>
