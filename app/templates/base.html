<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="origin">
  {% block robots %}{% endblock %}
  <link rel="canonical" href="{% block canonical %}{{ site_url() }}{% if request.url.path != '/' %}{{ request.url.path }}{% endif %}{% endblock %}">
  <title>{% block title %}Кафе Адам | Доставка{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="{% block body_class %}{% endblock %}" data-page="{% block page %}home{% endblock %}">
  {% include "includes/nav.html" %}
  {% block content %}{% endblock %}
  {% include "includes/footer.html" %}
  <div id="toastHost" class="toast-host" aria-live="polite"></div>
  <script src="/static/js/site.js?v=3"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
