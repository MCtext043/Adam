{% extends "base.html" %}
{% block title %}Оформление заказа | Кафе Адам{% endblock %}
{% block page %}checkout{% endblock %}
{% block content %}
<main class="page-main narrow-top">
  <header class="section-heading section-heading-tight">
    <p class="eyebrow">Доставка</p>
    <h1>Оформление заказа</h1>
    <p class="min-order-hint" id="checkoutMinOrderHint"></p>
  </header>

  <div class="checkout-grid">
    <aside class="checkout-summary cart-panel" aria-label="Состав заказа">
      <p class="eyebrow">В корзине</p>
      <div class="cart-list" id="checkoutCartItems"></div>
      <div class="checkout-totals">
        <div class="cart-total checkout-line">
          <span>Сумма блюд</span>
          <strong id="checkoutSubtotal">0 ₽</strong>
        </div>
        <div class="cart-total checkout-line checkout-discount-line" id="discountLine" hidden>
          <span>Бонусы</span>
          <strong id="checkoutDiscount">−0 ₽</strong>
        </div>
        <div class="cart-total">
          <span>К оплате</span>
          <strong id="checkoutCartTotal">0 ₽</strong>
        </div>
      </div>
      <p class="bonus-preview" id="bonusPreview"></p>
      <div class="checkout-edit-row">
        <a class="button button-ghost button-sm" href="/cart">Корзина</a>
        <a class="button button-ghost button-sm" href="/#menu">К блюдам</a>
      </div>
    </aside>

    <section class="checkout-form-wrap">
      <div class="account-banner" id="accountBanner" hidden></div>
      <div class="loyalty-spend-panel" id="loyaltySpendPanel" hidden>
        <label class="loyalty-spend-label">
          <input type="checkbox" id="useLoyaltyPoints">
          Списать бонусы (1 бонус = 1 ₽)
        </label>
        <label class="loyalty-spend-amount-label" id="loyaltyAmountWrap" hidden>
          Сколько списать
          <input type="number" id="loyaltyPointsInput" min="0" step="1" value="0">
          <span class="field-hint" id="loyaltyAvailableHint"></span>
        </label>
      </div>
      <form class="order-form" id="orderForm">
        <label>
          Имя
          <input name="customer_name" type="text" placeholder="Как к вам обращаться" required minlength="2">
        </label>
        <label>
          Телефон
          <input name="phone" type="tel" placeholder="+7 999 000-00-00" required minlength="5">
        </label>
        <label>
          Email
          <input name="email" type="email" placeholder="для письма с заказом" id="orderEmail" required>
        </label>
        <label>
          Адрес доставки
          <textarea name="address" placeholder="Улица, дом, квартира" required minlength="8"></textarea>
        </label>
        <label>
          Комментарий
          <textarea name="comment" placeholder="Например: не звонить в домофон"></textarea>
        </label>
        <button class="button button-dark" type="submit">Отправить заказ</button>
        <p class="form-message" id="orderMessage"></p>
      </form>
    </section>
  </div>
</main>
{% endblock %}
{% block scripts %}
<script src="/static/js/storefront.js"></script>
{% endblock %}
